<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#16213e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="数独ヒント">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
  <title>数独ヒントツール</title>
</head>
<body>

  <header>
    <h1>数独ヒントツール</h1>
  </header>

  <!-- タブ -->
  <nav class="tabs">
    <button class="tab-btn active" data-tab="camera">📷 撮影</button>
    <button class="tab-btn" data-tab="manual">✏️ 手入力</button>
    <button class="tab-btn" data-tab="board">🧩 盤面</button>
  </nav>

  <main>

    <!-- ローディング -->
    <div id="loading-overlay" class="loading-overlay hidden">
      <div class="spinner"></div>
      <p id="loading-msg">処理中...</p>
    </div>

    <!-- 撮影画面 -->
    <div id="camera-screen" class="screen active">
      <video id="video" autoplay playsinline muted></video>
      <div class="camera-overlay">
        <p class="camera-hint">数独の盤面を枠内に収めて撮影してください</p>
        <div class="viewfinder"></div>
        <div class="capture-btn-wrap">
          <button id="capture-btn" aria-label="撮影">
            <div class="inner"></div>
          </button>
        </div>
      </div>
      <!-- ファイル選択ボタン（カメラ非対応時・デバッグ用） -->
      <div class="file-input-wrap">
        <label for="file-input" class="btn btn-secondary">📁 画像から読み込む</label>
        <input type="file" id="file-input" accept="image/*" capture="environment">
      </div>
    </div>

    <!-- 手入力画面 -->
    <div id="manual-screen" class="screen">
      <div class="manual-info">空のセルをタップして数字を入力してください</div>
      <div id="manual-grid" class="sudoku-grid"></div>
      <div class="numpad">
        <div class="numpad-grid">
          <button class="numpad-btn manual-num" data-n="1">1</button>
          <button class="numpad-btn manual-num" data-n="2">2</button>
          <button class="numpad-btn manual-num" data-n="3">3</button>
          <button class="numpad-btn manual-num" data-n="4">4</button>
          <button class="numpad-btn manual-num" data-n="5">5</button>
          <button class="numpad-btn manual-num" data-n="6">6</button>
          <button class="numpad-btn manual-num" data-n="7">7</button>
          <button class="numpad-btn manual-num" data-n="8">8</button>
          <button class="numpad-btn manual-num" data-n="9">9</button>
          <button class="numpad-btn numpad-clear manual-num" data-n="0">✕</button>
          <button class="numpad-btn numpad-confirm" id="manual-done-btn">完了</button>
        </div>
        <p class="numpad-hint">入力完了後「完了」でヒントを表示します</p>
      </div>
    </div>

    <!-- プレビュー画面 -->
    <div id="preview-screen" class="screen">
      <canvas id="preview-canvas"></canvas>
      <div class="preview-actions">
        <button id="retake-btn" class="btn btn-secondary">撮り直す</button>
        <button id="analyze-btn" class="btn btn-primary">解析する</button>
      </div>
    </div>

    <!-- 盤面・ヒント画面 -->
    <div id="board-screen" class="screen">

      <!-- モード切替バー -->
      <div id="mode-bar" class="mode-bar">
        <button id="mode-edit-btn" class="mode-btn active" data-mode="edit">✏️ 修正</button>
        <button id="mode-hint-btn" class="mode-btn" data-mode="hint">💡 ヒント</button>
      </div>

      <div id="sudoku-grid" class="sudoku-grid"></div>

      <!-- 数字キーパッド（修正モード時） -->
      <div id="numpad" class="numpad">
        <div class="numpad-grid">
          <button class="numpad-btn" data-n="1">1</button>
          <button class="numpad-btn" data-n="2">2</button>
          <button class="numpad-btn" data-n="3">3</button>
          <button class="numpad-btn" data-n="4">4</button>
          <button class="numpad-btn" data-n="5">5</button>
          <button class="numpad-btn" data-n="6">6</button>
          <button class="numpad-btn" data-n="7">7</button>
          <button class="numpad-btn" data-n="8">8</button>
          <button class="numpad-btn" data-n="9">9</button>
          <button class="numpad-btn numpad-clear" data-n="0">✕</button>
          <button class="numpad-btn numpad-confirm" id="mode-done-btn">完了</button>
        </div>
        <p class="numpad-hint">セルをタップして数字を入力・修正できます</p>
      </div>

      <!-- ヒントパネル（ヒントモード時） -->
      <div id="hint-panel" class="hint-panel hidden">
        <h2>ヒント</h2>
        <p id="hint-text" class="hint-text">盤面を確認してヒントを表示します。</p>
        <div class="hint-actions">
          <button id="next-hint-btn" class="btn btn-primary">次のヒントを適用</button>
          <button id="clear-board-btn" class="btn btn-secondary">リセット</button>
        </div>
      </div>

      <!-- デバッグログ -->
      <div id="debug-log">ログ待機中...</div>
    </div>

  </main>

  <div id="status-bar" class="status-bar">0 / 81 マス確定</div>

  <!-- OpenCV.js（CDN） onRuntimeInitialized で準備完了を通知 -->
  <script>
    var _cvReady = false;
    var Module = {
      onRuntimeInitialized: function() {
        _cvReady = true;
        console.log('OpenCV.js 準備完了');
      }
    };
  </script>
  <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
  <!-- Tesseract.js（CDN） -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <!-- 盤面検出 -->
  <script src="./detector.js"></script>
  <!-- OCR -->
  <script src="./ocr.js"></script>
  <!-- メインアプリ -->
  <script src="./app.js"></script>
</body>
</html>
